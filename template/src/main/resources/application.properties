spring.application.name=${APP_NAME:template}
server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---- Primary Datasource ----
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:template_db}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# ---- Secondary Datasource ----
app.datasource.secondary.url=${SECONDARY_DATABASE_URL:jdbc:h2:mem:secondary_db}
app.datasource.secondary.username=${SECONDARY_DATABASE_USERNAME:sa}
app.datasource.secondary.password=${SECONDARY_DATABASE_PASSWORD:}
app.datasource.secondary.driver-class-name=${SECONDARY_DATABASE_DRIVER:org.h2.Driver}

# ---- JPA / Hibernate ----
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ---- Swagger / OpenAPI ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# ---- JWT ----
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ---- AES-CBC ----
app.aes-cbc.key=${AES_KEY_B64:}

# ---- Rate Limiting (Bucket4j) ----
app.rate-limit.public.capacity=${RATE_LIMIT_PUBLIC_CAPACITY:100}
app.rate-limit.public.refill-per-minute=${RATE_LIMIT_PUBLIC_REFILL:100}
app.rate-limit.authenticated.capacity=${RATE_LIMIT_AUTH_CAPACITY:60}
app.rate-limit.authenticated.refill-per-minute=${RATE_LIMIT_AUTH_REFILL:60}
app.rate-limit.reset-seconds=${RATE_LIMIT_RESET_SECONDS:60}

# ---- Logging ----
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.sepring.template=${LOG_LEVEL_APP:DEBUG}
